# Runs on all pushes (including main) so release workflows are not the only gate.
# Relies on serial mocha execution and process.chdir/env mutation in tests — do not enable parallel workers.
name: tests
on:
  push:
  workflow_dispatch:

jobs:
  unit-tests:
    strategy:
      matrix:
        os: ['ubuntu-latest', 'windows-latest']
        node_version: [lts/-1, lts/*, latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm run test
